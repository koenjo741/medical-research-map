<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Medical Research Resources Map – A curated dashboard of databases, AI tools, literature management, and academic writing resources for medical researchers." />
  <title>Medical Research Resources Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FFD700' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 18h8'/><path d='M3 22h18'/><path d='M14 22a7 7 0 1 0 0-14h-1'/><path d='M9 14h2'/><path d='M9 12a2 2 0 1 1-2-2V6a2 2 0 1 1 4 0v4a2 2 0 0 1-2 2Z'/><path d='M12 6h3a2 2 0 0 1 2 2v2'/></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════ HEADER ═══════════════ -->
  <header id="app-header" class="header">
    <div class="header__inner">
      <div class="header__brand">
        <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 18h8"/>
          <path d="M3 22h18"/>
          <path d="M14 22a7 7 0 1 0 0-14h-1"/>
          <path d="M9 14h2"/>
          <path d="M9 12a2 2 0 1 1-2-2V6a2 2 0 1 1 4 0v4a2 2 0 0 1-2 2Z"/>
          <path d="M12 6h3a2 2 0 0 1 2 2v2"/>
        </svg>
        <h1 class="header__title">Medical Research Resources Map</h1>
      </div>
      <div class="header__search-wrapper">
        <svg class="header__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" class="header__search" type="text" placeholder="Search resources…" autocomplete="off" />
      </div>
    </div>
  </header>

  <!-- ═══════════════ COLUMN TITLES (sticky) ═══════════════ -->
  <div id="column-titles" class="column-titles"></div>

  <!-- ═══════════════ MAIN GRID ═══════════════ -->
  <main id="dashboard" class="dashboard"></main>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <footer id="legend" class="legend"></footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
